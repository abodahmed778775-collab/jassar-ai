<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة جسار AI لصناعة التطبيقات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">

    <!-- الهيدر الاحترافي باسمك -->
    <header class="border-b border-gray-800 bg-[#111827] p-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white font-bold text-xl⚡">⚡</div>
            <h1 class="text-xl font-black tracking-wide text-blue-400">منصة جـسـار AI</h1>
        </div>
        <span class="text-xs bg-green-500/10 text-green-400 border border-green-500/20 px-3 py-1 rounded-full font-mono">المحرك المحلي نشط</span>
    </header>

    <!-- منطقة العمل الرئيسية المصممة مثل Bolt -->
    <main class="flex-1 flex flex-col md:flex-row p-4 gap-4 h-[calc(100vh-73px)]">
        
        <!-- القسم الأيمن: إدخال الأوامر -->
        <div class="w-full md:w-1/3 flex flex-col bg-[#111827] rounded-xl border border-gray-800 p-4 gap-4 shadow-xl">
            <h2 class="text-lg font-bold text-gray-200 border-b border-gray-800 pb-2">ماذا تريد أن تصنع اليوم؟</h2>
            <textarea id="promptInput" placeholder="اكتب فكرتك هنا بالتفصيل (مثال: اصنع لي تطبيق ويب لـ...)" class="w-full flex-1 p-3 bg-[#1f2937] border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 resize-none"></textarea>
            <button onclick="generateApp()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 active:scale-[0.98] transition-all rounded-lg font-bold text-white text-center shadow-md shadow-blue-600/20">
                ابنِ التطبيق الآن 🚀
            </button>
        </div>

        <!-- القسم الأيسر: شاشة المعاينة والأكواد الصادرة -->
        <div class="flex-1 flex flex-col bg-[#111827] rounded-xl border border-gray-800 p-4 shadow-xl">
            <div class="flex border-b border-gray-800 pb-2 justify-between items-center">
                <h2 class="text-lg font-bold text-gray-200">نافذة المعاينة والإنتاج الدقيق</h2>
                <span class="text-xs text-gray-400 font-mono">index.html</span>
            </div>
            <div class="flex-1 bg-[#1f2937] rounded-lg mt-3 p-4 font-mono text-sm overflow-auto text-green-400 border border-gray-800" id="outputArea">
                في انتظار أوامرك البرمجية يا جسار... ابدأ بكتابة فكرتك بالجانب الأيمن واضغط زر البناء.
            </div>
        </div>

    </main>

    <script>
        async function generateApp() {
            const prompt = document.getElementById('promptInput').value;
            const outputArea = document.getElementById('outputArea');
            if(!prompt) return alert('رجاءً اكتب فكرتك أولاً يا جسار!');

            outputArea.innerText = "جاري الاتصال بمحرك الذكاء الاصطناعي وبناء التطبيق بدقة عالية...";

            try {
                const response = await fetch('/generate-app', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const data = await response.json();
                outputArea.innerText = data.message;
            } catch (error) {
                outputArea.innerText = "حدث خطأ أثناء معالجة البيانات، تأكد من تشغيل السيرفر.";
            }
        }
    </script>
</body>
</html>
